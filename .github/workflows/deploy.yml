name: Deploy to Netlify

on:
  workflow_dispatch: # Manual trigger only — template repo has no Netlify site
  # push:           # Uncomment for real sites once NETLIFY_HOOK_URL secret is set
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build
        run: curl -s -X POST "${{ secrets.NETLIFY_HOOK_URL }}"
