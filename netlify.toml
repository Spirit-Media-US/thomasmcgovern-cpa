[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Branch preview deployments
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://cdn.sanity.io https://assets.spiritmediapublishing.com https://www.google-analytics.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://SANITY_PROJECT_ID.api.sanity.io https://www.google-analytics.com https://analytics.google.com; frame-src https://www.youtube.com; media-src 'self' https://assets.spiritmediapublishing.com; object-src 'none'; base-uri 'self'"

# TODO: Update domain before going live
[[redirects]]
  from = "https://www.REPLACE_DOMAIN.com/*"
  to = "https://REPLACE_DOMAIN.com/:splat"
  status = 301
  force = true
